apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app-demo1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/clhamo/argo.git
    targetRevision: dev
    path: . 
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
